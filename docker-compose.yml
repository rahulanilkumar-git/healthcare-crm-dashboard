services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: healthcare_crm
      MYSQL_USER: crm
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  laravel:
    build:
      context: ./backend
    working_dir: /app
    command: sh start.sh
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && cp -n .env.example .env && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    depends_on:
      - laravel

volumes:
  mysql_data:
